name: Daily Tech News Sync

on:
  schedule:
    # 每20分钟执行一次
    - cron: '*/20 * * * *'
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 允许提交文件

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest tech news
        run: python scripts/fetch_news.py

      - name: Commit & push news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "chore: sync tech news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
