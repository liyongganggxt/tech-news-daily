<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日科技新闻 · Daily Tech News</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3348;
      --accent: #6c8ef5;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --tag-bg: #1e2d5a;
      --tag-text: #7ea8f8;
      --badge-bg: #1e3a2a;
      --badge-text: #4ade80;
      --card-hover: #252941;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #13162a 0%, #1a1d3a 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #update-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .refresh-btn {
      padding: 7px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }

    .refresh-btn:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Layout ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 360px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-icon {
      position: absolute;
      left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
    }

    .filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-tag {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .filter-tag:hover, .filter-tag.active {
      background: var(--tag-bg);
      border-color: var(--accent);
      color: var(--tag-text);
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .stat-num {
      font-weight: 700;
      color: var(--accent);
    }

    /* ── News Grid ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .news-card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--tag-bg);
      border-radius: 4px;
      font-size: 0.72rem;
      color: var(--tag-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .category-badge {
      padding: 3px 8px;
      background: var(--badge-bg);
      border-radius: 4px;
      font-size: 0.7rem;
      color: var(--badge-text);
      white-space: nowrap;
    }

    .card-title {
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .pub-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .read-link {
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .read-link:hover { color: var(--accent2); }

    /* ── Loading / Empty ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--text-muted); }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }

    /* ── Error Banner ── */
    .error-banner {
      background: #2d1515;
      border: 1px solid #5c2626;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      color: #f87171;
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 16px; }
      .container { padding: 16px; }
      .news-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div class="logo-text">
      <h1>每日科技新闻</h1>
      <p>Daily Tech News · Auto-updated every day</p>
    </div>
  </div>
  <div class="header-meta">
    <span id="update-time">加载中…</span>
    <button class="refresh-btn" onclick="loadNews()">
      ↻ 刷新
    </button>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜索新闻标题或关键词…"
             oninput="renderNews()" />
    </div>
    <div class="filter-tags" id="filter-tags">
      <span class="filter-tag active" data-cat="all">全部</span>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>
  <div id="error-container"></div>
  <div id="news-container">
    <div class="loading">
      <div class="spinner"></div>
      <p>正在加载最新科技新闻…</p>
    </div>
  </div>
</div>

<footer>
  数据来源：IT之家 · 36氪 · 少数派 · 虎嗅 · 极客公园 · The Verge · Ars Technica · TechCrunch · Wired · MIT Tech Review · Engadget · ZDNet · The Register · BBC Tech · Hacker News<br />
  由 <a href="https://github.com/liyongganggxt/tech-news-daily" target="_blank">GitHub Actions</a>
  每20分钟自动更新 · 仅供学习与阅读
</footer>

<script>
  let allNews = [];
  let activeCategory = 'all';

  // 相对时间格式化
  function relativeTime(isoStr) {
    const d = new Date(isoStr);
    if (isNaN(d)) return '';
    const diff = Date.now() - d.getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return `${mins} 分钟前`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours} 小时前`;
    const days = Math.floor(hours / 24);
    if (days < 30) return `${days} 天前`;
    return d.toLocaleDateString('zh-CN');
  }

  // 构建分类过滤器
  function buildFilters(items) {
    const cats = ['all', ...new Set(items.map(i => i.category).filter(Boolean))];
    const container = document.getElementById('filter-tags');
    container.innerHTML = cats.map(c =>
      `<span class="filter-tag ${c === activeCategory ? 'active' : ''}"
             data-cat="${c}"
             onclick="setCategory('${c}')">
         ${c === 'all' ? '全部' : c}
       </span>`
    ).join('');
  }

  function setCategory(cat) {
    activeCategory = cat;
    buildFilters(allNews);
    renderNews();
  }

  // 渲染新闻列表
  function renderNews() {
    const query = document.getElementById('search-input').value.toLowerCase();
    let items = allNews;

    if (activeCategory !== 'all') {
      items = items.filter(i => i.category === activeCategory);
    }

    if (query) {
      items = items.filter(i =>
        (i.title || '').toLowerCase().includes(query) ||
        (i.description || '').toLowerCase().includes(query) ||
        (i.source || '').toLowerCase().includes(query)
      );
    }

    const container = document.getElementById('news-container');
    const statsBar  = document.getElementById('stats-bar');

    statsBar.innerHTML = `
      <span class="stat-item">📰 共 <span class="stat-num">${items.length}</span> 条新闻</span>
      <span class="stat-item">📡 来源 <span class="stat-num">${new Set(items.map(i=>i.source)).size}</span> 个</span>
    `;

    if (!items.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🔎</div>
          <p>没有找到匹配的新闻</p>
        </div>`;
      return;
    }

    container.innerHTML = `
      <div class="news-grid">
        ${items.map(item => `
          <a class="news-card" href="${item.link}" target="_blank" rel="noopener noreferrer">
            <div class="card-header">
              <span class="source-tag">📡 ${item.source || '未知来源'}</span>
              ${item.category ? `<span class="category-badge">${item.category}</span>` : ''}
            </div>
            <div class="card-title">${item.title || '（无标题）'}</div>
            ${item.description ? `<div class="card-desc">${item.description}</div>` : ''}
            <div class="card-footer">
              <span class="pub-date">🕐 ${relativeTime(item.pubDate)}</span>
              <span class="read-link">阅读原文 →</span>
            </div>
          </a>
        `).join('')}
      </div>`;
  }

  // 加载 news.json
  async function loadNews() {
    document.getElementById('news-container').innerHTML = `
      <div class="loading"><div class="spinner"></div><p>正在加载…</p></div>`;
    document.getElementById('error-container').innerHTML = '';

    try {
      const basePath = window.location.pathname.replace(/\/$/, '');
      const resp = await fetch(`${basePath}/news.json?t=${Date.now()}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      allNews = data.items || [];

      // 更新时间
      const updatedAt = data.updated_at
        ? new Date(data.updated_at).toLocaleString('zh-CN')
        : '未知';
      document.getElementById('update-time').textContent = `🕐 上次更新：${updatedAt}`;

      buildFilters(allNews);
      renderNews();
    } catch (err) {
      document.getElementById('news-container').innerHTML = `
        <div class="empty-state">
          <div class="emoji">⚠️</div>
          <p>新闻数据尚未生成，请先运行 GitHub Actions 工作流</p>
        </div>`;
      document.getElementById('error-container').innerHTML = `
        <div class="error-banner">
          ⚠️ 无法加载 news.json：${err.message}。
          请在 GitHub 仓库的 Actions 页面手动触发 "Daily Tech News Sync" 工作流，等待完成后刷新此页面。
        </div>`;
      document.getElementById('update-time').textContent = '数据未就绪';
    }
  }

  loadNews();
</script>
</body>
</html>
